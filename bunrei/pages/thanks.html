*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{--black:#1d1d1f;--accent:#0071e3;--accent-hover:#0077ED;--gray-100:#f2f2f7;--gray-200:#e5e5ea;--gray-500:#8e8e93;--gray-600:#636366;--white:#fff;--radius:12px;--shadow:0 2px 12px rgba(0,0,0,.08);--font-sans:'Inter','Noto Sans JP',sans-serif;--nav-h:64px}

.thanks-icon{width:56px;height:56px;margin:0 auto 20px}
.thanks h1{font-size:clamp(24px,5vw,32px);font-weight:700;margin-bottom:12px;letter-spacing:-.02em}
.thanks p{color:var(--gray-600);margin-bottom:4px;font-size:15px;line-height:1.8}
.thanks .submit-btn{display:inline-block;margin-top:36px;padding:14px 40px;background:var(--accent);color:#fff;border:none;border-radius:8px;font-size:16px;font-weight:600;font-family:var(--font-sans);cursor:pointer;transition:background .2s}.thanks .submit-btn:hover{background:var(--accent-hover)}
.footer{padding:40px clamp(16px,4vw,48px) 24px;max-width:720px;margin:0 auto;border-top:1px solid var(--gray-200)}.footer-copy{font-size:12px;color:var(--gray-500);text-align:center}.footer-links{display:flex;justify-content:center;gap:20px;margin-bottom:12px;flex-wrap:wrap}.footer-links a{font-size:13px;color:var(--gray-500);transition:color .2s}.footer-links a:hover{color:var(--accent)}
