<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0071e3"/>
      <stop offset="100%" stop-color="#005bb5"/>
    </linearGradient>
  </defs>
  <!-- 背景 -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- 装飾 -->
  <circle cx="1100" cy="530" r="230" fill="#3b9eff" opacity="0.1"/>
  <circle cx="100" cy="100" r="190" fill="#3b9eff" opacity="0.08"/>
  <!-- ブリーフケースアイコン -->
  <g transform="translate(600, 190)">
    <!-- ケース本体 -->
    <rect x="-45" y="-20" width="90" height="60" rx="8" fill="none" stroke="#bfdbfe" stroke-width="4"/>
    <!-- 持ち手 -->
    <path d="M-18,-20 L-18,-32 Q-18,-40 -10,-40 L10,-40 Q18,-40 18,-32 L18,-20" fill="none" stroke="#bfdbfe" stroke-width="4"/>
    <!-- 中央の留め具 -->
    <rect x="-8" y="0" width="16" height="12" rx="3" fill="#bfdbfe" opacity="0.5"/>
  </g>
  <!-- サービス名 -->
  <text x="600" y="340" text-anchor="middle" font-family="'Hiragino Kaku Gothic ProN', 'Noto Sans JP', sans-serif" font-size="80" font-weight="bold" fill="#ffffff" letter-spacing="8">ジムショ</text>
  <!-- キャッチコピー -->
  <text x="600" y="410" text-anchor="middle" font-family="'Hiragino Kaku Gothic ProN', 'Noto Sans JP', sans-serif" font-size="30" fill="#bfdbfe">個人事業主の事務作業をゼロに近づける</text>
  <!-- 下部ライン -->
  <rect x="500" y="460" width="200" height="3" rx="2" fill="#bfdbfe" opacity="0.5"/>
  <!-- 会社名 -->
  <text x="600" y="560" text-anchor="middle" font-family="'Hiragino Kaku Gothic ProN', 'Noto Sans JP', sans-serif" font-size="18" fill="#bfdbfe" opacity="0.6">株式会社 礼</text>
</svg>