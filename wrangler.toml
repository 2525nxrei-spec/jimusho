# ============================================================
# ジムショ — Cloudflare Pages 設定
# ============================================================

name = "jimusho"
compatibility_date = "2024-12-01"
pages_build_output_dir = "."

# ============================================================
# D1 データベースバインディング
# ============================================================
[[d1_databases]]
binding = "DB"
database_name = "toolbox-db"
database_id = "851cecb1-000f-48b8-953c-fbf353143f4a"

# ============================================================
# 環境変数（本番）
# ============================================================
[vars]
FRONTEND_URL = "https://jimusho-tool.com"
STRIPE_PRICE_PRO = "price_1TF9k19Fc8HnuaokFuM61zbo"

# 以下はシークレットとして設定（wrangler pages secret put コマンド使用）
# wrangler pages secret put JWT_SECRET --project-name jimusho
# wrangler pages secret put STRIPE_SECRET_KEY --project-name jimusho
# wrangler pages secret put STRIPE_WEBHOOK_SECRET --project-name jimusho

# ============================================================
# プレビュー環境
# ============================================================
[env.preview.vars]
FRONTEND_URL = "https://preview.jimusho.pages.dev"
STRIPE_PRICE_PRO = "price_1TF9k19Fc8HnuaokFuM61zbo"
