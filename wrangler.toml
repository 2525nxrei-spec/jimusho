# ============================================================
# ジムショ API — Cloudflare Workers 設定
# ============================================================

name = "jimusho-api"
main = "workers/index.js"
compatibility_date = "2024-12-01"

# ============================================================
# D1 データベースバインディング
# ============================================================
[[d1_databases]]
binding = "DB"
database_name = "toolbox-db"
database_id = "851cecb1-000f-48b8-953c-fbf353143f4a"

# ============================================================
# 環境変数
# ============================================================
[vars]
FRONTEND_URL = "https://jimusho-tool.com"
STRIPE_PRICE_PRO = "price_1TF9k19Fc8HnuaokFuM61zbo"

# 以下はシークレットとして設定（wrangler secret put コマンド使用）
# wrangler secret put STRIPE_SECRET_KEY
# wrangler secret put STRIPE_WEBHOOK_SECRET
# wrangler secret put JWT_SECRET

# ============================================================
# 開発環境
# ============================================================
[dev]
port = 8790

[env.dev]
name = "jimusho-api-dev"

[env.dev.vars]
FRONTEND_URL = "http://localhost:8790"
STRIPE_PRICE_PRO = "price_1TF9k19Fc8HnuaokFuM61zbo"
