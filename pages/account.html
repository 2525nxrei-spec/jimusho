<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-Q5PXT07YCP"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-Q5PXT07YCP');
  </script>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>アカウント｜ジムショ</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" fetchpriority="high">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Noto+Sans+JP:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
    :root {
      --black: #1d1d1f;
      --gray-700: #636366;
      --gray-500: #8e8e93;
      --gray-200: #e5e5ea;
      --gray-100: #f2f2f7;
      --gray-50: #f9f9fb;
      --white: #fff;
      --accent: #0071e3;
      --green: #16a34a;
      --green-light: #dcfce7;
      --font: "Plus Jakarta Sans", "Noto Sans JP", -apple-system, sans-serif;
    }
    html { font-size:16px; -webkit-font-smoothing:antialiased; }
    body { font-family:var(--font); color:var(--black); background:var(--gray-100); line-height:1.7; }
    a { color:inherit; text-decoration:none; }
    .container { max-width:1080px; margin:0 auto; padding:0 24px; }

    .nav { position:sticky; top:0; z-index:100; background:rgba(255,255,255,0.72); backdrop-filter:saturate(180%) blur(20px); -webkit-backdrop-filter:saturate(180%) blur(20px); border-bottom:1px solid rgba(0,0,0,0.06); }
    .nav__inner { display:flex; align-items:center; justify-content:space-between; height:48px; }
    .nav__logo { font-size:1.15rem; font-weight:800; letter-spacing:-0.04em; }
    .nav__logo span { color:var(--accent); }
    .nav__links { display:flex; gap:24px; align-items:center; }
    .nav__link { font-size:0.8rem; font-weight:500; color:var(--gray-700); transition:color 0.2s; }

    .account { padding:64px 0 80px; max-width:560px; margin:0 auto; }
    .account__title { font-size:1.4rem; font-weight:700; margin-bottom:32px; }

    .card { background:var(--white); border-radius:16px; padding:28px 24px; margin-bottom:16px; }
    .card__label { font-size:0.72rem; font-weight:600; text-transform:uppercase; letter-spacing:0.08em; color:var(--gray-500); margin-bottom:8px; }
    .card__value { font-size:1rem; font-weight:600; }
    .card__sub { font-size:0.82rem; color:var(--gray-700); margin-top:4px; }

    .badge { display:inline-block; font-size:0.72rem; font-weight:700; padding:3px 12px; border-radius:980px; }
    .badge--pro { background:var(--accent); color:var(--white); }
    .badge--free { background:var(--gray-100); color:var(--gray-500); }

    .btn { display:inline-block; font-family:var(--font); font-size:0.84rem; font-weight:600; padding:10px 24px; border-radius:980px; border:none; cursor:pointer; transition:opacity 0.2s; text-align:center; }
    .btn:hover { opacity:0.85; }
    .btn--primary { background:var(--accent); color:var(--white); }
    .btn--outline { background:var(--white); color:var(--black); border:1.5px solid var(--gray-200); }
    .btn--danger { background:var(--white); color:#dc2626; border:1.5px solid #fecaca; }

    .actions { display:flex; gap:12px; flex-wrap:wrap; margin-top:16px; }

    .footer { background:var(--black); color:var(--white); padding:24px 0; text-align:center; margin-top:40px; }
    .footer__text { font-size:0.72rem; color:rgba(255,255,255,0.3); }
  </style>
<link rel="stylesheet" href="/assets/css/ux-enhance.css">
</head>
<body>
  <nav class="nav">
    <div class="nav__inner container">
      <a href="/" class="nav__logo">ジムショ</a>
      <div class="nav__links">
        <a href="/" class="nav__link">ツール一覧</a>
        <a href="/pages/pricing.html" class="nav__link">料金</a>
        <button class="nav__link" id="nav-logout" style="color:#dc2626;background:none;border:none;cursor:pointer;font:inherit;">ログアウト</button>
      </div>
    </div>
  </nav>

  <section class="account container">
    <h1 class="account__title">アカウント</h1>

    <div class="card">
      <div class="card__label">メールアドレス</div>
      <div class="card__value" id="account-email">--</div>
    </div>

    <div class="card">
      <div class="card__label">現在のプラン</div>
      <div class="card__value" id="account-plan">
        <span class="badge badge--free">Free</span>
      </div>
      <div class="card__sub" id="account-plan-detail"></div>
      <div class="actions" id="account-actions"></div>
    </div>

    <div class="card" id="subscription-card" style="display:none">
      <div class="card__label">サブスクリプション</div>
      <div class="card__value" id="sub-status">--</div>
      <div class="card__sub" id="sub-next-billing"></div>
    </div>

    <!-- パスワード変更 -->
    <div class="card">
      <div class="card__label">パスワード変更</div>
      <div style="margin-bottom:12px;">
        <label style="display:block;font-size:.72rem;font-weight:600;text-transform:uppercase;letter-spacing:.08em;color:var(--gray-500);margin-bottom:6px;">現在のパスワード</label>
        <input type="password" id="current-pw" autocomplete="current-password" style="width:100%;padding:10px 14px;border:1.5px solid var(--gray-200);border-radius:10px;font-size:.88rem;font-family:var(--font);outline:none;">
      </div>
      <div style="margin-bottom:12px;">
        <label style="display:block;font-size:.72rem;font-weight:600;text-transform:uppercase;letter-spacing:.08em;color:var(--gray-500);margin-bottom:6px;">新しいパスワード</label>
        <input type="password" id="new-pw" autocomplete="new-password" minlength="8" style="width:100%;padding:10px 14px;border:1.5px solid var(--gray-200);border-radius:10px;font-size:.88rem;font-family:var(--font);outline:none;">
        <div id="pw-strength" style="font-size:.72rem;color:var(--gray-500);margin-top:4px;">8文字以上、英字と数字を含めてください</div>
      </div>
      <div style="margin-bottom:12px;">
        <label style="display:block;font-size:.72rem;font-weight:600;text-transform:uppercase;letter-spacing:.08em;color:var(--gray-500);margin-bottom:6px;">新しいパスワード（確認）</label>
        <input type="password" id="confirm-pw" autocomplete="new-password" style="width:100%;padding:10px 14px;border:1.5px solid var(--gray-200);border-radius:10px;font-size:.88rem;font-family:var(--font);outline:none;">
      </div>
      <button class="btn btn--primary" id="btn-change-pw" style="width:100%;">パスワードを変更</button>
    </div>

    <!-- アカウント操作 -->
    <div class="card" style="border:1.5px solid #fecaca;">
      <div class="card__label" style="color:#dc2626;">アカウント操作</div>
      <div class="card__sub">ログアウトするとログイン画面に戻ります。アカウント削除は取り消せません。</div>
      <div class="actions" style="margin-top:12px;">
        <button class="btn btn--outline" id="btn-logout">ログアウト</button>
        <button class="btn btn--danger" id="btn-delete-account">アカウントを削除</button>
      </div>
    </div>
  </section>

  <footer class="footer">
    <div class="container">
      <div class="footer__text">&copy; 2026 ジムショ. All rights reserved.</div>
    </div>
  </footer>

  <script src="/assets/js/auth.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      // 未ログインならリダイレクト
      if (!TOOLBOX_AUTH.isLoggedIn()) {
        window.location.href = '/pages/pricing.html';
        return;
      }

      document.getElementById('nav-logout').addEventListener('click', (e) => {
        e.preventDefault();
        if (!confirm('ログアウトしますか？')) return;
        TOOLBOX_AUTH.logout();
      });

      // パスワード強度チェック
      document.getElementById('new-pw').addEventListener('input', function() {
        const pw = this.value;
        const el = document.getElementById('pw-strength');
        if (pw.length === 0) { el.textContent = '8文字以上、英字と数字を含めてください'; el.style.color = 'var(--gray-500)'; }
        else if (pw.length < 8) { el.textContent = 'あと' + (8 - pw.length) + '文字必要です'; el.style.color = '#dc2626'; }
        else if (!/[a-zA-Z]/.test(pw) || !/[0-9]/.test(pw)) { el.textContent = '英字と数字の両方を含めてください'; el.style.color = '#d97706'; }
        else { el.textContent = 'パスワード強度: OK'; el.style.color = '#16a34a'; }
      });

      // パスワード変更
      document.getElementById('btn-change-pw').addEventListener('click', async () => {
        const btn = document.getElementById('btn-change-pw');
        const currentPw = document.getElementById('current-pw').value;
        const newPw = document.getElementById('new-pw').value;
        const confirmPw = document.getElementById('confirm-pw').value;
        if (!currentPw) { alert('現在のパスワードを入力してください'); return; }
        if (!newPw || newPw.length < 8) { alert('新しいパスワードは8文字以上で入力してください'); return; }
        if (!/[a-zA-Z]/.test(newPw) || !/[0-9]/.test(newPw)) { alert('パスワードは英字と数字の両方を含めてください'); return; }
        if (newPw !== confirmPw) { alert('新しいパスワードが一致しません'); return; }
        btn.disabled = true; btn.textContent = '変更中...';
        try {
          const res = await fetch('/api/auth/password', {
            method: 'PUT',
            headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + localStorage.getItem('toolbox_token') },
            body: JSON.stringify({ current_password: currentPw, new_password: newPw })
          });
          const data = await res.json();
          if (res.ok) {
            alert('パスワードを変更しました');
            document.getElementById('current-pw').value = '';
            document.getElementById('new-pw').value = '';
            document.getElementById('confirm-pw').value = '';
            document.getElementById('pw-strength').textContent = '8文字以上、英字と数字を含めてください';
            document.getElementById('pw-strength').style.color = 'var(--gray-500)';
          } else { alert(data.error || 'パスワード変更に失敗しました'); }
        } catch { alert('通信エラーが発生しました'); }
        finally { btn.disabled = false; btn.textContent = 'パスワードを変更'; }
      });

      // ログアウト
      document.getElementById('btn-logout').addEventListener('click', () => {
        if (!confirm('ログアウトしますか？')) return;
        TOOLBOX_AUTH.logout();
      });

      // アカウント削除
      document.getElementById('btn-delete-account').addEventListener('click', async () => {
        const pw = prompt('アカウントを削除するには、パスワードを入力してください。\nこの操作は取り消せません。');
        if (!pw) return;
        if (!confirm('本当にアカウントを削除しますか？\nすべてのデータが完全に削除されます。')) return;
        const btn = document.getElementById('btn-delete-account');
        btn.disabled = true; btn.textContent = '削除中...';
        try {
          const res = await fetch('/api/auth/account', {
            method: 'DELETE',
            headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + localStorage.getItem('toolbox_token') },
            body: JSON.stringify({ password: pw })
          });
          const data = await res.json();
          if (res.ok) {
            localStorage.removeItem('toolbox_token');
            localStorage.removeItem('toolbox_user');
            alert('アカウントを削除しました。ご利用ありがとうございました。');
            window.location.href = '/';
          } else { alert(data.error || 'アカウント削除に失敗しました'); }
        } catch { alert('通信エラーが発生しました'); }
        finally { btn.disabled = false; btn.textContent = 'アカウントを削除'; }
      });

      // セッションタイムアウト（24時間操作なしでログアウト）
      (function() {
        const TIMEOUT = 24 * 60 * 60 * 1000;
        function resetTimer() { localStorage.setItem('toolbox_last_activity', Date.now()); }
        function checkTimeout() {
          const last = parseInt(localStorage.getItem('toolbox_last_activity') || '0', 10);
          if (last && Date.now() - last > TIMEOUT && localStorage.getItem('toolbox_token')) {
            localStorage.removeItem('toolbox_token');
            localStorage.removeItem('toolbox_user');
            alert('長時間操作がなかったため、セキュリティのためログアウトしました。');
            window.location.href = '/pages/pricing.html';
          }
        }
        checkTimeout(); resetTimer();
        ['click', 'keydown', 'scroll', 'touchstart'].forEach(e => document.addEventListener(e, resetTimer, { passive: true }));
      })();

      // ユーザー情報取得
      let user = await TOOLBOX_AUTH.fetchMe();
      if (!user) {
        window.location.href = '/pages/pricing.html';
        return;
      }

      // Stripe Checkout成功後のリダイレクト: Webhookがまだ処理されていない場合に備えてリトライ
      // exponential backoff: 1s, 2s, 4s, 8s, 15s（合計約30秒）
      const params = new URLSearchParams(window.location.search);
      if (params.get('session_id') && user.plan !== 'pro') {
        const delays = [1000, 2000, 4000, 8000, 15000];
        for (let i = 0; i < delays.length; i++) {
          await new Promise(r => setTimeout(r, delays[i]));
          user = await TOOLBOX_AUTH.fetchMe();
          if (user && user.plan === 'pro') break;
        }
        // URLからsession_idを除去
        window.history.replaceState({}, '', '/pages/account.html');
      }

      // 表示更新
      document.getElementById('account-email').textContent = user.email;
      const planEl = document.getElementById('account-plan');
      const planDetail = document.getElementById('account-plan-detail');
      const actions = document.getElementById('account-actions');

      if (user.plan === 'pro') {
        planEl.innerHTML = '<span class="badge badge--pro">ジムショ Pro</span>';
        planDetail.textContent = '月額100円 - 全ツール利用可能';

        // サブスク情報取得
        try {
          const billing = await TOOLBOX_AUTH.getBillingStatus();
          if (billing.subscription) {
            const subCard = document.getElementById('subscription-card');
            subCard.style.display = '';
            document.getElementById('sub-status').textContent =
              billing.subscription.status === 'active' ? '有効' :
              billing.subscription.cancel_at_period_end ? '解約予定' :
              billing.subscription.status;
            if (billing.subscription.next_billing_date) {
              const date = new Date(billing.subscription.next_billing_date);
              document.getElementById('sub-next-billing').textContent =
                `次回請求日: ${date.getFullYear()}年${date.getMonth() + 1}月${date.getDate()}日`;
            }
          }
        } catch (err) {
          console.error('課金情報取得エラー:', err);
        }

        // ポータルボタン
        const portalBtn = document.createElement('button');
        portalBtn.className = 'btn btn--outline';
        portalBtn.textContent = 'お支払い管理';
        portalBtn.addEventListener('click', async () => {
          portalBtn.disabled = true;
          portalBtn.textContent = '処理中...';
          try {
            await TOOLBOX_AUTH.openPortal();
          } catch (err) {
            alert(err.message);
            portalBtn.disabled = false;
            portalBtn.textContent = 'お支払い管理';
          }
        });
        actions.appendChild(portalBtn);
      } else {
        planEl.innerHTML = '<span class="badge badge--free">Free</span>';
        planDetail.textContent = '基本ツールのみ利用可能';

        const upgradeBtn = document.createElement('button');
        upgradeBtn.className = 'btn btn--primary';
        upgradeBtn.textContent = 'Proにアップグレード（100円/月）';
        upgradeBtn.addEventListener('click', async () => {
          upgradeBtn.disabled = true;
          upgradeBtn.textContent = '処理中...';
          try {
            await TOOLBOX_AUTH.startCheckout();
          } catch (err) {
            alert(err.message);
            upgradeBtn.disabled = false;
            upgradeBtn.textContent = 'Proにアップグレード（100円/月）';
          }
        });
        actions.appendChild(upgradeBtn);
      }
    });
  </script>
<script src="/assets/js/ux-enhance.js"></script>
</body>
</html>
