<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-Q5PXT07YCP"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-Q5PXT07YCP');
  </script>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>アカウント｜ToolBox</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" fetchpriority="high">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Noto+Sans+JP:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
    :root {
      --black: #1d1d1f;
      --gray-700: #636366;
      --gray-500: #8e8e93;
      --gray-200: #e5e5ea;
      --gray-100: #f2f2f7;
      --gray-50: #f9f9fb;
      --white: #fff;
      --accent: #0071e3;
      --green: #16a34a;
      --green-light: #dcfce7;
      --font: "Plus Jakarta Sans", "Noto Sans JP", -apple-system, sans-serif;
    }
    html { font-size:16px; -webkit-font-smoothing:antialiased; }
    body { font-family:var(--font); color:var(--black); background:var(--gray-100); line-height:1.7; }
    a { color:inherit; text-decoration:none; }
    .container { max-width:1080px; margin:0 auto; padding:0 24px; }

    .nav { position:sticky; top:0; z-index:100; background:rgba(255,255,255,0.72); backdrop-filter:saturate(180%) blur(20px); -webkit-backdrop-filter:saturate(180%) blur(20px); border-bottom:1px solid rgba(0,0,0,0.06); }
    .nav__inner { display:flex; align-items:center; justify-content:space-between; height:48px; }
    .nav__logo { font-size:1.15rem; font-weight:800; letter-spacing:-0.04em; }
    .nav__logo span { color:var(--accent); }
    .nav__links { display:flex; gap:24px; align-items:center; }
    .nav__link { font-size:0.8rem; font-weight:500; color:var(--gray-700); transition:color 0.2s; }

    .account { padding:64px 0 80px; max-width:560px; margin:0 auto; }
    .account__title { font-size:1.4rem; font-weight:700; margin-bottom:32px; }

    .card { background:var(--white); border-radius:16px; padding:28px 24px; margin-bottom:16px; }
    .card__label { font-size:0.72rem; font-weight:600; text-transform:uppercase; letter-spacing:0.08em; color:var(--gray-500); margin-bottom:8px; }
    .card__value { font-size:1rem; font-weight:600; }
    .card__sub { font-size:0.82rem; color:var(--gray-700); margin-top:4px; }

    .badge { display:inline-block; font-size:0.72rem; font-weight:700; padding:3px 12px; border-radius:980px; }
    .badge--pro { background:var(--accent); color:var(--white); }
    .badge--free { background:var(--gray-100); color:var(--gray-500); }

    .btn { display:inline-block; font-family:var(--font); font-size:0.84rem; font-weight:600; padding:10px 24px; border-radius:980px; border:none; cursor:pointer; transition:opacity 0.2s; text-align:center; }
    .btn:hover { opacity:0.85; }
    .btn--primary { background:var(--accent); color:var(--white); }
    .btn--outline { background:var(--white); color:var(--black); border:1.5px solid var(--gray-200); }
    .btn--danger { background:var(--white); color:#dc2626; border:1.5px solid #fecaca; }

    .actions { display:flex; gap:12px; flex-wrap:wrap; margin-top:16px; }

    .footer { background:var(--black); color:var(--white); padding:24px 0; text-align:center; margin-top:40px; }
    .footer__text { font-size:0.72rem; color:rgba(255,255,255,0.3); }
  </style>
</head>
<body>
  <nav class="nav">
    <div class="nav__inner container">
      <a href="/" class="nav__logo">Tool<span>Box</span></a>
      <div class="nav__links">
        <a href="/" class="nav__link">ツール一覧</a>
        <a href="/pages/pricing.html" class="nav__link">料金</a>
        <a href="#" class="nav__link" id="nav-logout" style="color:#dc2626">ログアウト</a>
      </div>
    </div>
  </nav>

  <section class="account container">
    <h1 class="account__title">アカウント</h1>

    <div class="card">
      <div class="card__label">メールアドレス</div>
      <div class="card__value" id="account-email">--</div>
    </div>

    <div class="card">
      <div class="card__label">現在のプラン</div>
      <div class="card__value" id="account-plan">
        <span class="badge badge--free">Free</span>
      </div>
      <div class="card__sub" id="account-plan-detail"></div>
      <div class="actions" id="account-actions"></div>
    </div>

    <div class="card" id="subscription-card" style="display:none">
      <div class="card__label">サブスクリプション</div>
      <div class="card__value" id="sub-status">--</div>
      <div class="card__sub" id="sub-next-billing"></div>
    </div>
  </section>

  <footer class="footer">
    <div class="container">
      <div class="footer__text">&copy; 2026 ToolBox. All rights reserved.</div>
    </div>
  </footer>

  <script src="/assets/js/auth.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      // 未ログインならリダイレクト
      if (!TOOLBOX_AUTH.isLoggedIn()) {
        window.location.href = '/pages/pricing.html';
        return;
      }

      document.getElementById('nav-logout').addEventListener('click', (e) => {
        e.preventDefault();
        TOOLBOX_AUTH.logout();
      });

      // ユーザー情報取得
      const user = await TOOLBOX_AUTH.fetchMe();
      if (!user) {
        window.location.href = '/pages/pricing.html';
        return;
      }

      // 表示更新
      document.getElementById('account-email').textContent = user.email;
      const planEl = document.getElementById('account-plan');
      const planDetail = document.getElementById('account-plan-detail');
      const actions = document.getElementById('account-actions');

      if (user.plan === 'pro') {
        planEl.innerHTML = '<span class="badge badge--pro">ジムショ Pro</span>';
        planDetail.textContent = '月額100円 - 全ツール利用可能';

        // サブスク情報取得
        try {
          const billing = await TOOLBOX_AUTH.getBillingStatus();
          if (billing.subscription) {
            const subCard = document.getElementById('subscription-card');
            subCard.style.display = '';
            document.getElementById('sub-status').textContent =
              billing.subscription.status === 'active' ? '有効' :
              billing.subscription.cancel_at_period_end ? '解約予定' :
              billing.subscription.status;
            if (billing.subscription.next_billing_date) {
              const date = new Date(billing.subscription.next_billing_date);
              document.getElementById('sub-next-billing').textContent =
                `次回請求日: ${date.getFullYear()}年${date.getMonth() + 1}月${date.getDate()}日`;
            }
          }
        } catch (err) {
          console.error('課金情報取得エラー:', err);
        }

        // ポータルボタン
        const portalBtn = document.createElement('button');
        portalBtn.className = 'btn btn--outline';
        portalBtn.textContent = 'お支払い管理';
        portalBtn.addEventListener('click', async () => {
          portalBtn.disabled = true;
          portalBtn.textContent = '処理中...';
          try {
            await TOOLBOX_AUTH.openPortal();
          } catch (err) {
            alert(err.message);
            portalBtn.disabled = false;
            portalBtn.textContent = 'お支払い管理';
          }
        });
        actions.appendChild(portalBtn);
      } else {
        planEl.innerHTML = '<span class="badge badge--free">Free</span>';
        planDetail.textContent = '基本ツールのみ利用可能';

        const upgradeBtn = document.createElement('button');
        upgradeBtn.className = 'btn btn--primary';
        upgradeBtn.textContent = 'Proにアップグレード（100円/月）';
        upgradeBtn.addEventListener('click', async () => {
          upgradeBtn.disabled = true;
          upgradeBtn.textContent = '処理中...';
          try {
            await TOOLBOX_AUTH.startCheckout();
          } catch (err) {
            alert(err.message);
            upgradeBtn.disabled = false;
            upgradeBtn.textContent = 'Proにアップグレード（100円/月）';
          }
        });
        actions.appendChild(upgradeBtn);
      }
    });
  </script>
</body>
</html>
