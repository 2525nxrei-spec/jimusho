<html lang="ja">
<head>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>送信完了 — ジムショ</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" fetchpriority="high">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Noto+Sans+JP:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
    :root{--black:#1d1d1f;--gray-700:#636366;--gray-500:#8e8e93;--gray-300:#d1d1d6;--gray-200:#e5e5ea;--gray-100:#f2f2f7;--white:#fff;--accent:#0071e3;--font:"Plus Jakarta Sans","Noto Sans JP",-apple-system,sans-serif}
    html{font-size:16px;scroll-behavior:smooth;-webkit-font-smoothing:antialiased}
    body{font-family:var(--font);color:var(--black);background:var(--white);line-height:1.7}
    a{color:inherit;text-decoration:none}

    .nav{position:sticky;top:0;z-index:100;background:rgba(255,255,255,0.85);backdrop-filter:saturate(180%) blur(20px);-webkit-backdrop-filter:saturate(180%) blur(20px);border-bottom:1px solid rgba(0,0,0,0.05)}
    .nav__inner{display:flex;align-items:center;justify-content:space-between;height:52px;max-width:1100px;margin:0 auto;padding:0 24px}
    .nav__logo{font-size:1.2rem;font-weight:800;letter-spacing:-0.04em}
    .nav__logo span{color:var(--accent)}
    .nav__back{font-size:0.82rem;font-weight:500;color:var(--accent);display:flex;align-items:center;gap:4px}

    .thanks{max-width:640px;margin:0 auto;padding:120px 24px 80px;text-align:center}
    .thanks__icon{width:64px;height:64px;margin:0 auto 24px}
    .thanks__title{font-size:clamp(1.6rem,3.5vw,2.2rem);font-weight:800;letter-spacing:-0.03em;margin-bottom:16px}
    .thanks__text{font-size:0.95rem;color:var(--gray-700);line-height:1.8;margin-bottom:8px}
    .thanks__btn{display:inline-flex;align-items:center;justify-content:center;margin-top:40px;font-family:var(--font);font-size:0.95rem;font-weight:600;background:var(--accent);color:var(--white);padding:16px 40px;border:none;border-radius:12px;cursor:pointer;transition:background 0.2s,transform 0.2s,box-shadow 0.2s}
    .thanks__btn:hover{background:#0077ed;transform:translateY(-1px);box-shadow:0 4px 16px rgba(0,113,227,0.25)}

    .footer{background:var(--black);color:var(--white);padding:48px 0 28px}
    .footer__inner{display:flex;justify-content:space-between;align-items:start;max-width:1100px;margin:0 auto;padding:0 24px;margin-bottom:40px}
    .footer__brand-name{font-size:1.15rem;font-weight:800;margin-bottom:8px}
    .footer__brand-name span{color:var(--accent)}
    .footer__brand-desc{font-size:0.78rem;color:rgba(255,255,255,0.4);max-width:260px;line-height:1.7}
    .footer__cols{display:flex;gap:56px}
    .footer__col-title{font-size:0.68rem;font-weight:600;text-transform:uppercase;letter-spacing:0.12em;color:rgba(255,255,255,0.35);margin-bottom:14px}
    .footer__col a{display:block;font-size:0.82rem;color:rgba(255,255,255,0.6);margin-bottom:8px;transition:color 0.2s}
    .footer__col a:hover{color:var(--white)}
    .footer__bottom{padding-top:20px;border-top:1px solid rgba(255,255,255,0.08);font-size:0.72rem;color:rgba(255,255,255,0.3);display:flex;justify-content:space-between;max-width:1100px;margin:0 auto;padding:20px 24px 0}
    .footer__bottom a{color:rgba(255,255,255,0.3);margin-left:20px;transition:color 0.2s}
    .footer__bottom a:hover{color:rgba(255,255,255,0.6)}

    @media(max-width:640px){
      .thanks{padding:80px 16px 60px}
      .footer__inner{flex-direction:column;gap:32px}
      .footer__cols{gap:32px}
      .footer__bottom{flex-direction:column;gap:8px}
    }
  </style>
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-1964975138803092" crossorigin="anonymous"></script>
</head>
<body>

  <nav class="nav">
    <div class="nav__inner">
      <a href="../" class="nav__logo">ジムショ</a>
      <a href="../" class="nav__back">&larr; ツール一覧</a>
    </div>
  </nav>

  <main class="thanks">
    <svg class="thanks__icon" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
      <circle cx="32" cy="32" r="30" stroke="#34c759" stroke-width="3" fill="#f0fdf4"/>
      <path d="M20 33l8 8 16-16" stroke="#34c759" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
    <h1 class="thanks__title">送信完了</h1>
    <p class="thanks__text">お問い合わせありがとうございます。</p>
    <p class="thanks__text">内容を確認の上、3営業日以内にご連絡いたします。</p>
    <a href="../" class="thanks__btn">トップページに戻る</a>
  </main>

  <footer class="footer">
    <div class="footer__inner">
      <div>
        <div class="footer__brand-name">ジムショ</div>
        <p class="footer__brand-desc">個人事業主・フリーランスのための無料業務効率化ツール集。すべてブラウザで完結。</p>
      </div>
      <div class="footer__cols">
        <div>
          <div class="footer__col-title">ジムショ</div>
          <a href="../">トップページ</a>
          <a href="../#popular">人気ツール</a>
          <a href="../#all">すべてのツール</a>
        </div>
        <div>
          <div class="footer__col-title">サイト情報</div>
          <a href="about.html">運営者情報</a>
          <a href="contact.html">お問い合わせ</a>
          <a href="privacy.html">プライバシーポリシー</a>
          <a href="terms.html">利用規約</a>
        </div>
      </div>
    </div>
    <div class="footer__bottom">
      <span>&copy; 2026 ジムショ. All rights reserved.</span>
      <div>
        <a href="privacy.html">プライバシーポリシー</a>
        <a href="terms.html">利用規約</a>
      </div>
    </div>
  </footer>

</body>
</html>
