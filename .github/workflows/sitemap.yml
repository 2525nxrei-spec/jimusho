name: Auto-update sitemap & notify search engines

on:
  push:
    branches: [master]
    paths:
      - '**.html'
      - 'tools/**'
      - 'pages/**'

jobs:
  update-sitemap:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate sitemap.xml
        run: |
          DOMAIN="https://muryo-tool.com"
          SITEMAP="sitemap.xml"

          cat > "$SITEMAP" <<'HEADER'
          <?xml version="1.0" encoding="UTF-8"?>
          <urlset xmlns="http://www.sitemaps.org/schemas/sitemap/0.9">
          HEADER
          # Remove leading whitespace from heredoc
          sed -i 's/^          //' "$SITEMAP"

          # Main page
          LASTMOD=$(git log -1 --format="%cs" -- index.html 2>/dev/null || date +%Y-%m-%d)
          echo "  <url><loc>${DOMAIN}/</loc><lastmod>${LASTMOD}</lastmod><changefreq>weekly</changefreq><priority>1.0</priority></url>" >> "$SITEMAP"

          # Tool pages
          for dir in tools/*/; do
            if [ -f "${dir}index.html" ]; then
              TOOL_NAME=$(basename "$dir")
              LASTMOD=$(git log -1 --format="%cs" -- "${dir}index.html" 2>/dev/null || date +%Y-%m-%d)
              echo "  <url><loc>${DOMAIN}/tools/${TOOL_NAME}/</loc><lastmod>${LASTMOD}</lastmod><changefreq>monthly</changefreq><priority>0.8</priority></url>" >> "$SITEMAP"
            fi
          done

          # Sub-site index pages
          for subsite in calc bunrei template check icon keiyaku; do
            echo "  <url><loc>${DOMAIN}/${subsite}/</loc><lastmod>$(date +%Y-%m-%d)</lastmod><changefreq>weekly</changefreq><priority>0.9</priority></url>" >> "$SITEMAP"
          done

          # Static pages
          for page in pages/*.html; do
            if [ -f "$page" ]; then
              PAGE_NAME=$(basename "$page")
              LASTMOD=$(git log -1 --format="%cs" -- "$page" 2>/dev/null || date +%Y-%m-%d)
              echo "  <url><loc>${DOMAIN}/pages/${PAGE_NAME}</loc><lastmod>${LASTMOD}</lastmod><changefreq>yearly</changefreq><priority>0.3</priority></url>" >> "$SITEMAP"
            fi
          done

          echo "</urlset>" >> "$SITEMAP"

      - name: Commit sitemap if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add sitemap.xml
          if git diff --cached --quiet; then
            echo "No sitemap changes"
          else
            git commit -m "Auto-update sitemap.xml [skip ci]"
            git push
          fi

      - name: Ping Google Sitemap
        run: |
          curl -s "https://www.google.com/ping?sitemap=https://muryo-tool.com/sitemap.xml" || true

      - name: Notify IndexNow (Bing/Yandex)
        run: |
          INDEXNOW_KEY="78a6a831d5a3427b8168789bff6745cd"

          # Collect changed HTML files
          CHANGED=$(git diff --name-only HEAD~1 HEAD -- '*.html' 2>/dev/null | head -20)
          if [ -z "$CHANGED" ]; then
            echo "No HTML changes to notify"
            exit 0
          fi

          # Build URL list
          URLS=""
          while IFS= read -r file; do
            if [ "$file" = "index.html" ]; then
              URLS="${URLS}\"https://muryo-tool.com/\","
            else
              URL_PATH=$(echo "$file" | sed 's|/index\.html$|/|' | sed 's|\.html$||')
              URLS="${URLS}\"https://muryo-tool.com/${URL_PATH}\","
            fi
          done <<< "$CHANGED"
          URLS="${URLS%,}"

          curl -s -X POST "https://api.indexnow.org/indexnow" \
            -H "Content-Type: application/json" \
            -d "{
              \"host\": \"muryo-tool.com\",
              \"key\": \"${INDEXNOW_KEY}\",
              \"keyLocation\": \"https://muryo-tool.com/${INDEXNOW_KEY}.txt\",
              \"urlList\": [${URLS}]
            }" || true
          echo "IndexNow notified with URLs: ${URLS}"
